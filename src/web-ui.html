<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Classifier</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f9f6f0;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* Controls */
        .controls {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 1px 4px #0001;
            margin-bottom: 1.5rem;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 0.75rem;
        }

        .controls-row:last-child {
            margin-bottom: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .field-wide {
            flex: 1;
            min-width: 120px;
        }

        label {
            font-size: 0.75rem;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        input[type=number] {
            width: 80px;
            padding: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        input[type=file] {
            font-size: 0.9rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100%;
            margin-bottom: 0rem;
        }

        button {
            padding: 0.5rem 1.4rem;
            background: #e8934a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        button:hover {
            background: #d4823b;
        }

        /* Results */
        .results {
            display: none;
        }

        .group {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px #0001;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .group-header {
            padding: 0.6rem 1rem;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-body {
            padding: 0 0.5rem 0.5rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 0.3rem 0.5rem;
            color: #888;
            font-size: 0.75rem;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
            user-select: none;
        }

        th.sortable {
            cursor: pointer;
        }

        th.sortable:hover {
            color: #444;
        }

        th.sort-asc::after {
            content: ' ▲';
        }

        th.sort-desc::after {
            content: ' ▼';
        }

        td {
            padding: 0.35rem 0.5rem;
            border-bottom: 1px solid #f5f5f5;
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .score-bar {
            display: inline-block;
            height: 8px;
            background: #e8934a;
            border-radius: 4px;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Hover card */
        .has-whites {
            cursor: pointer;
        }

        .hover-card {
            display: none;
            position: fixed;
            z-index: 100;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 16px #0002;
            padding: 0.75rem;
            min-width: 340px;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: visible;
            font-size: 0.8rem;
            pointer-events: none;
        }

        .hover-card h4 {
            margin: 0 0 0.5rem;
            font-size: 0.85rem;
        }

        .hover-card table {
            width: 100%;
            font-size: 0.78rem;
        }

        .hover-card th {
            color: #aaa;
            font-weight: 600;
            padding: 0.2rem 0.4rem;
            border-bottom: 1px solid #eee;
        }

        .hover-card td {
            padding: 0.2rem 0.4rem;
            border-bottom: 1px solid #f8f8f8;
        }

        .hover-card tr:last-child td {
            border-bottom: none;
        }

        .tag {
            display: inline-block;
            padding: 0 0.3rem;
            border-radius: 3px;
            font-size: 0.7rem;
            margin-right: 2px;
        }

        .tag-dist {
            background: #e8e8f8;
            color: #446;
        }

        .tag-style {
            background: #f8e8f8;
            color: #644;
        }

        .tag-surf {
            background: #e8f8e8;
            color: #464;
        }

        .tag-debuff {
            background: #f8e8e8;
            color: #644;
        }

        .src-own {
            color: #e8934a;
            font-weight: 700;
        }

        .src-parent {
            color: #aaa;
        }

        /* Icon group colors */
        .icon-speed .group-header {
            background: #ddeef8;
        }

        .icon-stamina .group-header {
            background: #f8dde6;
        }

        .icon-power .group-header {
            background: #f8eddd;
        }

        .icon-guts .group-header {
            background: #f8dddd;
        }

        .icon-wit .group-header {
            background: #e8f8dd;
        }

        .icon-turf .group-header {
            background: #ddf8f0;
        }

        .icon-dirt .group-header {
            background: #f0e8d8;
        }

        .icon-sprint .group-header,
        .icon-mile .group-header,
        .icon-mid .group-header,
        .icon-long .group-header {
            background: #e8e8f8;
        }

        .icon-heart .group-header {
            background: #f8ddf0;
        }

        .icon-clubs .group-header {
            background: #e8f8e8;
        }

        .icon-ace .group-header {
            background: #333;
            color: white;
        }

        .icon-trash .group-header {
            background: #eee;
            color: #888;
        }

        /* Race Section */
        .race-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px #0001;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .race-section .group-header {
            background: linear-gradient(135deg, #e8934a, #d4823b);
            color: white;
        }

        .race-score {
            font-weight: 700;
            color: #e8934a;
        }

        select {
            padding: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
            background: white;
            min-width: 200px;
        }

        /* Summary */
        .summary {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 4px #0001;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .summary-chip {
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            font-size: 0.82rem;
            background: #f0f0f0;
        }

        .summary-total {
            margin-left: auto;
            font-size: 0.85rem;
            color: #888;
        }

        .error {
            color: #c00;
            background: #fff0f0;
            padding: 1rem;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>🏇 Uma Classifier</h1>
    <p class="subtitle">Load your roster JSON to score and assign favorite icons based on sparks.</p>

    <div class="controls">
        <div class="controls-row">
            <div class="field">
                <label>Roster JSON</label>
                <input type="file" id="fileInput" accept=".json">
            </div>
            <button onclick="run()">Classify</button>
        </div>

        <div class="section-label">Category settings</div>
        <div class="controls-row">
            <div class="field">
                <label>Keep per category</label>
                <input type="number" id="keepN" value="7" min="1" max="50">
            </div>
            <div class="field">
                <label>Min category score</label>
                <input type="number" id="minScore" value="2" min="0" step="0.5">
            </div>
            <div class="field">
                <label>Keep aces</label>
                <input type="number" id="keepAce" value="15" min="1" max="100">
            </div>
            <div class="field">
                <label>Ace rank score ≥</label>
                <input type="number" id="aceThresh" value="12500" min="0" step="100">
            </div>
            <div class="field">
                <label>Keep hearts</label>
                <input type="number" id="keepHeart" value="20" min="1" max="100">
            </div>
            <div class="field">
                <label>Heart white ≥</label>
                <input type="number" id="heartThresh" value="20" min="0" step="0.5">
            </div>
        </div>

        <div class="section-label">Scoring weights</div>
        <div class="controls-row">
            <div class="field">
                <label>Own factor weight</label>
                <input type="number" id="weightOwn" value="1" min="0.1" step="0.5">
            </div>
            <div class="field">
                <label>Parent factor weight</label>
                <input type="number" id="weightParent" value=".8" min="0.1" step="0.5">
            </div>
            <div class="field">
                <label>White skill multiplier</label>
                <input type="number" id="whiteSkillMult" value="1.0" min="0" step="0.1">
            </div>
            <div class="field">
                <label>White stat multiplier</label>
                <input type="number" id="whiteStatMult" value="0.5" min="0" step="0.1">
            </div>
        </div>
    </div>

    <div class="section-label">Race target (optional)</div>
    <div class="controls-row">
      <div class="field">
        <label>Target Race</label>
        <select id="targetRace">
          <option value="">— None —</option>
        </select>
      </div>
      <div class="field">
        <label>Top N parents</label>
        <input type="number" id="raceTopN" value="7" min="1" max="50">
      </div>
    </div>

    <div id="results" class="results"></div>

    <script>
        const ICON_LABEL = {
            speed: '🥤 Speed sparks',
            stamina: '🍚 Stamina sparks',
            power: '🍫 Power sparks',
            guts: '🥕 Guts sparks',
            wit: '🍰 Wit sparks',
            turf: '♦ Turf sparks',
            dirt: '👟 Dirt sparks',
            sprint: '👟 Sprint sparks',
            mile: '👟 Mile sparks',
            mid: '👟 Mid sparks',
            long: '👟 Long sparks',
            heart: '♥ Skill sparks',
            clubs: '♣ Debuffer',
            ace: '♠ Ace',
            trash: '🗑️ Trash',
        };
        const ICON_ORDER = [
            'speed', 'stamina', 'power', 'guts', 'wit',
            'turf', 'dirt', 'sprint', 'mile', 'mid', 'long',
            'heart', 'clubs', 'ace', 'trash'
        ];

        const sortState = {};
        let _lastResults = null;
        let _lastTargetRace = null;

        // Load races on startup
        async function loadRaces() {
            const res = await fetch('/races');
            if (!res.ok) return;
            const races = await res.json();
            const sel = document.getElementById('targetRace');
            let lastCM = true;
            for (const r of races) {
                if (lastCM && !r.isCM && sel.options.length > 1) {
                    const sep = document.createElement('option');
                    sep.disabled = true;
                    sep.textContent = '── G1 Races ──';
                    sel.appendChild(sep);
                }
                lastCM = r.isCM;
                const opt = document.createElement('option');
                opt.value = r.raceId;
                opt.textContent = `${r.raceName} (${r.distanceCategory} ${r.groundName} @ ${r.trackName})`;
                sel.appendChild(opt);
            }
        }

        loadRaces();

        async function run() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { alert('Please select a JSON file.'); return; }

            const config = {
                keepPerCategory: parseInt(document.getElementById('keepN').value),
                minCategoryScore: parseFloat(document.getElementById('minScore').value),
                heartWhiteThreshold: parseFloat(document.getElementById('heartThresh').value),
                aceScoreThreshold: parseInt(document.getElementById('aceThresh').value),
                keepAce: parseInt(document.getElementById('keepAce').value),
                keepHeart: parseInt(document.getElementById('keepHeart').value),
                whiteSkillMultiplier: parseFloat(document.getElementById('whiteSkillMult').value),
                whiteStatBoostMultiplier: parseFloat(document.getElementById('whiteStatMult').value),
                weights: {
                    own: parseFloat(document.getElementById('weightOwn').value),
                    parent: parseFloat(document.getElementById('weightParent').value),
                },
            };

            const targetRaceId = document.getElementById('targetRace').value;
            const text = await file.text();
            const res = await fetch('/classify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: JSON.parse(text),
                    config,
                    targetRaceId: targetRaceId ? parseInt(targetRaceId) : null,
                }),
            });

            const out = document.getElementById('results');
            out.style.display = 'block';

            if (!res.ok) {
                out.innerHTML = '<div class="error">Error: ' + (await res.text()) + '</div>';
                return;
            }

            const { results, targetRace } = await res.json();
            _lastTargetRace = targetRace;
            renderResults(results);
        }

        function sortRows(rows, col, dir) {
            return [...rows].sort((a, b) => {
                let av, bv;
                switch (col) {
                    case 'name': av = a.name; bv = b.name; break;
                    case 'id': av = a.trained_chara_id; bv = b.trained_chara_id; break;
                    case 'rs': av = a.rank_score; bv = b.rank_score; break;
                    case 'white': av = a.white_total; bv = b.white_total; break;
                    case 'debuff': av = a.debuff_score; bv = b.debuff_score; break;
                    case 'race': av = a.race_score ?? 0; bv = b.race_score ?? 0; break;
                    case 'cat': av = a._catScore; bv = b._catScore; break;
                    default: av = 0; bv = 0;
                }
                if (typeof av === 'string') return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
                return dir === 'asc' ? av - bv : bv - av;
            });
        }

        function renderRaceSection(results, targetRace, topN) {
            if (!targetRace) return '';

            const candidates = [...results]
                .filter(u => (u.race_score ?? 0) > 0)
                .sort((a, b) => (b.race_score ?? 0) - (a.race_score ?? 0))
                .slice(0, topN);

            if (candidates.length === 0) return '';

            const maxScore = Math.max(...candidates.map(u => u.race_score ?? 0), 1);

            const tableRows = candidates.map(u => {
                const barW = Math.round(((u.race_score ?? 0) / maxScore) * 80);
                const lock = u.is_locked ? '🔒 ' : '';
                const icon = ICON_LABEL[u.assigned_icon] ?? u.assigned_icon;
                const whitesJson = JSON.stringify(u.whites ?? []).replace(/"/g, '&quot;');
                return `<tr class="has-whites" data-whites="${whitesJson}">
                    <td>${lock}${u.name}</td>
                    <td style="color:#aaa">${u.trained_chara_id}</td>
                    <td>${u.rank_score.toLocaleString()}</td>
                    <td>${u.white_total.toFixed(1)}</td>
                    <td class="race-score"><span class="score-bar" style="width:${barW}px"></span>${(u.race_score ?? 0).toFixed(1)}</td>
                    <td style="color:#888;font-size:0.8rem">${icon}</td>
                </tr>`;
            }).join('');

            return `<div class="race-section">
                <div class="group-header">
                    <span>🤝 Top parents for ${targetRace.raceName} — ${targetRace.distanceCategory} ${targetRace.groundName} @ ${targetRace.trackName}</span>
                    <span style="font-weight:400;opacity:0.85">${candidates.length} umas</span>
                </div>
                <div class="group-body">
                    <table>
                        <tr>
                            <th>Name</th><th>ID</th><th>Rank Score</th>
                            <th>White ★</th><th>Race Score</th><th>Icon</th>
                        </tr>
                        ${tableRows}
                    </table>
                </div>
            </div>`;
        }

        function renderGroup(icon, umas, showRaceScore) {
            if (umas.length === 0) return '';

            const state = sortState[icon] ?? { col: 'rs', dir: 'desc' };
            const rows = sortRows(umas, state.col, state.dir);
            const maxCat = Math.max(...umas.map(u => u._catScore), 1);

            const cols = [
                { key: 'name', label: 'Name' },
                { key: 'id', label: 'ID' },
                { key: 'rs', label: 'Rank Score' },
                { key: 'white', label: 'White ★' },
                { key: 'debuff', label: 'Debuff ★' },
                ...(showRaceScore ? [{ key: 'race', label: '🤝 Race' }] : []),
                { key: 'cat', label: 'Cat. Score' },
            ];

            const headers = cols.map(c => {
                const isSort = state.col === c.key;
                const cls = ['sortable', isSort ? ('sort-' + state.dir) : ''].filter(Boolean).join(' ');
                return `<th class="${cls}" onclick="toggleSort('${icon}','${c.key}')">${c.label}</th>`;
            }).join('');

            const tableRows = rows.map(u => {
                const barW = Math.round((u._catScore / maxCat) * 80);
                const lock = u.is_locked ? '🔒 ' : '';
                const whitesJson = JSON.stringify(u.whites ?? []).replace(/"/g, '&quot;');
                const raceCell = showRaceScore
                    ? `<td class="race-score">${(u.race_score ?? 0).toFixed(1)}</td>`
                    : '';
                return `<tr class="has-whites" data-whites="${whitesJson}">
                    <td>${lock}${u.name}</td>
                    <td style="color:#aaa">${u.trained_chara_id}</td>
                    <td>${u.rank_score.toLocaleString()}</td>
                    <td>${u.white_total.toFixed(1)}</td>
                    <td>${u.debuff_score.toFixed(1)}</td>
                    ${raceCell}
                    <td><span class="score-bar" style="width:${barW}px"></span>${u._catScore.toFixed(1)}</td>
                </tr>`;
            }).join('');

            return `<div class="group icon-${icon}" id="group-${icon}">
                <div class="group-header">
                    <span>${ICON_LABEL[icon]}</span>
                    <span style="font-weight:400;opacity:0.7">${umas.length} umas</span>
                </div>
                <div class="group-body">
                    <table>
                        <tr>${headers}<th></th></tr>
                        ${tableRows}
                    </table>
                </div>
            </div>`;
        }

        function toggleSort(icon, col) {
            const state = sortState[icon] ?? { col: 'rs', dir: 'desc' };
            if (state.col === col) {
                sortState[icon] = { col, dir: state.dir === 'desc' ? 'asc' : 'desc' };
            } else {
                sortState[icon] = { col, dir: 'desc' };
            }
            const el = document.getElementById('group-' + icon);
            if (el && _lastResults) {
                const groups = groupResults(_lastResults);
                const showRaceScore = !!_lastTargetRace;
                el.outerHTML = renderGroup(icon, groups[icon], showRaceScore);
            }
        }

        function groupResults(results) {
            const groups = {};
            for (const icon of ICON_ORDER) groups[icon] = [];
            for (const u of results) {
                const catScore = u.scores[u.assigned_icon] ?? 0;
                groups[u.assigned_icon].push({ ...u, name: u.name ?? ('card:' + u.card_id), _catScore: catScore });
            }
            return groups;
        }

        function renderResults(results) {
            _lastResults = results;
            const groups = groupResults(results);
            const out = document.getElementById('results');
            const showRaceScore = !!_lastTargetRace;
            const topN = parseInt(document.getElementById('raceTopN').value) || 7;

            const total = results.length;
            const kept = results.filter(u => u.assigned_icon !== 'trash').length;

            let html = '<div class="summary">';
            for (const icon of ICON_ORDER) {
                if (groups[icon].length > 0)
                    html += `<span class="summary-chip">${ICON_LABEL[icon]}: <b>${groups[icon].length}</b></span>`;
            }
            html += `<span class="summary-total">Keeping ${kept} / ${total} &nbsp;|&nbsp; Transferring ${total - kept}</span>`;
            html += '</div>';

            // Race section first if a race is selected
            html += renderRaceSection(results, _lastTargetRace, topN);

            for (const icon of ICON_ORDER) {
                html += renderGroup(icon, groups[icon], showRaceScore);
            }

            out.innerHTML = html;
        }
    </script>

    <div class="hover-card" id="hoverCard"></div>

    <script>
        const hoverCard = document.getElementById('hoverCard');

        document.addEventListener('mousemove', e => {
            const row = e.target.closest('.has-whites');
            if (!row) {
                hoverCard.style.display = 'none';
                return;
            }

            const whites = JSON.parse(row.dataset.whites);
            if (!whites || whites.length === 0) {
                hoverCard.style.display = 'none';
                return;
            }

            // Sort by final_value descending
            whites.sort((a, b) => b.final_value - a.final_value);

            const rows = whites.map(w => {
                const tags = [
                    ...w.dist_cats.map(c => `<span class="tag tag-dist">${c}</span>`),
                    ...w.style_cats.map(c => `<span class="tag tag-style">${c}</span>`),
                    ...w.surf_cats.map(c => `<span class="tag tag-surf">${c}</span>`),
                    ...(w.is_debuff ? ['<span class="tag tag-debuff">debuff</span>'] : []),
                ].join('');
                const src = w.source === 'own'
                    ? '<span class="src-own">own</span>'
                    : '<span class="src-parent">parent</span>';
                const pm = w.pink_multiplier === 1.0 ? '-' : w.pink_multiplier.toFixed(2) + 'x';
                const sb = w.special_bonus === 1.0 ? '-' : w.special_bonus.toFixed(1) + 'x';
                return `<tr>
                    <td>${src}</td>
                    <td>${'★'.repeat(w.stars)}</td>
                    <td>${w.name}${tags ? '<br>' + tags : ''}</td>
                    <td style="color:#aaa">${pm}</td>
                    <td style="color:#aaa">${sb}</td>
                    <td style="font-weight:600">${w.final_value.toFixed(2)}</td>
                </tr>`;
            }).join('');

            hoverCard.innerHTML = `<h4>White sparks</h4>
                <table>
                    <tr>
                    <th>src</th><th>★</th><th>skill</th>
                    <th>pink×</th><th>bonus×</th><th>value</th>
                    </tr>
                    ${rows}
                </table>`;

            // Position near cursor, keep on screen
            const pad = 16;
            hoverCard.style.visibility = 'hidden';
            hoverCard.style.display = 'block';
            const rect = hoverCard.getBoundingClientRect();
            const cardW = rect.width;
            const cardH = rect.height;

            let x = e.clientX + pad;
            let y = e.clientY + pad;

            // Flip left if overflowing right edge
            if (x + cardW > window.innerWidth) x = e.clientX - cardW - pad;
            // Hard clamp all four edges — card never leaves viewport
            x = Math.min(Math.max(pad, x), window.innerWidth - cardW - pad);
            y = Math.min(Math.max(pad, y), window.innerHeight - cardH - pad);

            hoverCard.style.left = x + 'px';
            hoverCard.style.top = y + 'px';
            hoverCard.style.visibility = 'visible';
        });
    </script>
</body>

</html>
